<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realeaf Botanicals — Brand Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Data-driven variables are populated by JS from data.json */
    }

    #app-container {
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #app-container.loaded {
      opacity: 1;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      overflow-x: hidden;
    }

    img { display: block; }

    /* ─── HEADER ─── */
    .hdr {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 68px;
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
    }

    .hdr-logo { height: 36px; object-fit: contain; }

    .hdr-right { display: flex; align-items: center; gap: 16px; }

    .back-btn {
      display: none; align-items: center; gap: 8px;
      background: none; border: 1px solid var(--border2-color);
      color: var(--text-color); font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 500; letter-spacing: 0.04em;
      padding: 8px 18px; border-radius: 6px; cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .back-btn:hover { background: var(--bg3-color); border-color: #444; }
    .back-btn.show { display: flex; }

    .back-btn svg { flex-shrink: 0; }

    /* ─── SCREENS ─── */
    .screen { display: none; animation: fadeIn 0.3s ease; }
    .screen.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════
       BRANDS SCREEN
    ═══════════════════════════════ */
    .brands-wrap {
      padding: 64px 48px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .brands-hero {
      text-align: center;
      margin-bottom: 64px;
    }

    .brands-hero-eyebrow {
      font-size: 12px; font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--green2-color);
      margin-bottom: 14px;
    }

    .brands-hero h1 {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(42px, 6vw, 72px);
      font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      line-height: 1;
      margin-bottom: 16px;
    }

    .brands-hero p {
      font-size: 16px; color: var(--text2-color);
      line-height: 1.7; max-width: 520px; margin: 0 auto;
    }

    .brands-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    @media (max-width: 720px) { .brands-grid { grid-template-columns: 1fr; } }
    @media (min-width: 1300px) { .brands-grid { grid-template-columns: repeat(4, 1fr); } }

    .brand-card {
      position: relative; overflow: hidden; border-radius: 14px;
      aspect-ratio: 16/10; cursor: pointer;
      border: 1px solid var(--border-color);
      transition: transform 0.32s cubic-bezier(0.2,0,0.1,1),
                  box-shadow 0.32s ease, border-color 0.32s ease;
    }

    .brand-card:hover { transform: translateY(-5px) scale(1.01); }

    .brand-card {
      --brand-color: #ffffff;
      --brand-glow: rgba(255,255,255,0.12);
    }
    .brand-card:hover {
      box-shadow: 0 24px 60px var(--brand-glow), 0 0 0 1px var(--brand-color);
      border-color: var(--brand-color);
    }

    .brand-card-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      transition: transform 0.5s cubic-bezier(0.2,0,0.1,1);
    }
    .brand-card:hover .brand-card-bg { transform: scale(1.06); }

    .brand-card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.92) 0%,
        rgba(0,0,0,0.5) 50%,
        rgba(0,0,0,0.15) 100%
      );
      display: flex; flex-direction: column;
      justify-content: flex-end; padding: 24px 22px 22px;
    }

    .brand-card-logo {
      height: 38px; object-fit: contain; object-position: left;
      margin-bottom: 10px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
      transition: filter 0.2s;
    }
    .brand-card:hover .brand-card-logo { filter: drop-shadow(0 2px 12px rgba(255,255,255,0.2)); }

    .brand-card-tagline {
      font-size: 12px; color: rgba(255,255,255,0.65);
      line-height: 1.5; margin-bottom: 14px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .brand-card-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Oswald', sans-serif; font-size: 12px;
      font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 6px 14px; border-radius: 4px; width: fit-content;
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.07);
      color: white;
      transition: background 0.2s, border-color 0.2s;
    }
    .brand-card:hover .brand-card-btn {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.55);
    }

    /* ═══════════════════════════════
       BRAND DETAIL SCREEN
    ═══════════════════════════════ */
    .brand-hero {
      position: relative; height: min(420px, 50vw);
      overflow: hidden;
    }

    .brand-hero-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
    }

    .brand-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        105deg,
        rgba(8,8,8,0.97) 0%,
        rgba(8,8,8,0.78) 42%,
        rgba(8,8,8,0.2) 75%,
        transparent 100%
      );
      display: flex; align-items: center;
      padding: 0 60px;
    }

    .brand-hero-content { max-width: 560px; }

    .brand-hero-logo {
      height: 64px; object-fit: contain; object-position: left;
      margin-bottom: 22px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }

    .brand-hero-tagline {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(17px, 2.2vw, 24px);
      font-weight: 500; letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.88);
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .brand-hero-desc {
      font-size: 14px; color: rgba(255,255,255,0.62);
      line-height: 1.75; max-width: 460px;
    }

    .brand-accent-bar { height: 3px; width: 100%; }

    /* ─── Products Section ─── */
    .products-section {
      padding: 40px 48px 72px;
      max-width: 1440px;
      margin: 0 auto;
    }

    .products-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 20px;
      margin-bottom: 28px; flex-wrap: wrap;
    }

    .products-title-row { display: flex; align-items: baseline; gap: 10px; }

    .products-title {
      font-family: 'Oswald', sans-serif;
      font-size: 26px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    .products-count {
      font-size: 14px; color: var(--text3-color);
      font-weight: 500;
    }

    .filter-wrap { display: flex; gap: 8px; flex-wrap: wrap; }

    .filter-chip {
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border2-color);
      font-size: 12px; font-weight: 500; letter-spacing: 0.02em;
      color: var(--text2-color); cursor: pointer;
      transition: all 0.18s; background: none;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
    }
    .filter-chip:hover { color: var(--text-color); border-color: #555; }
    .filter-chip.on { background: var(--chip-bg,rgba(255,255,255,0.08)); border-color: var(--chip-border,#555); color: var(--chip-text,white); }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .prod-card {
      background: var(--bg3-color); border: 1px solid var(--border-color);
      border-radius: 12px; overflow: hidden; cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }
    .prod-card:hover { transform: translateY(-4px); border-color: var(--border2-color); }
    .prod-card.hidden { display: none; }

    .prod-thumb {
      width: 100%; aspect-ratio: 4/3;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }

    .prod-thumb-logo {
      height: 32px; opacity: 0.28; object-fit: contain;
      position: relative; z-index: 1;
      transition: opacity 0.2s;
    }
    .prod-card:hover .prod-thumb-logo { opacity: 0.45; }

    .prod-body { padding: 14px 14px 16px; }

    .prod-name {
      font-family: 'Oswald', sans-serif; font-size: 15px;
      font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.03em; line-height: 1.25;
      margin-bottom: 4px;
    }

    .prod-sub { font-size: 11px; color: var(--text2-color); margin-bottom: 10px; }

    .prod-tags { display: flex; flex-wrap: wrap; gap: 4px; }

    .ptag {
      font-size: 10px; font-weight: 500;
      padding: 3px 8px; border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.5);
    }

    .no-results {
      grid-column: 1/-1;
      text-align: center; padding: 60px 20px;
      color: var(--text3-color); font-size: 15px;
    }

    /* ═══════════════════════════════
       MODAL
    ═══════════════════════════════ */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--bg2-color); border: 1px solid var(--border2-color);
      border-radius: 18px; max-width: 660px; width: 100%;
      max-height: 88vh; overflow-y: auto;
      position: relative;
      animation: mIn 0.22s cubic-bezier(0.2,0,0.1,1);
      scrollbar-width: thin; scrollbar-color: var(--border2-color) transparent;
    }

    @keyframes mIn {
      from { opacity: 0; transform: scale(0.94) translateY(12px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }

    .modal::-webkit-scrollbar { width: 5px; }
    .modal::-webkit-scrollbar-thumb { background: var(--border2-color); border-radius: 3px; }

    .modal-close {
      position: absolute; top: 14px; right: 14px; z-index: 10;
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8); font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.18s;
      line-height: 1;
    }
    .modal-close:hover { background: rgba(255,255,255,0.12); }

    .modal-img-wrap {
      width: 100%; height: 240px; border-radius: 16px 16px 0 0;
      overflow: hidden; position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    .modal-img-logo {
      height: 64px; opacity: 0.35; object-fit: contain;
      position: relative; z-index: 1;
    }

    .modal-accent { height: 3px; width: 100%; }

    .modal-body { padding: 26px 30px 32px; }

    .modal-brand-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 4px 11px; border-radius: 4px;
      margin-bottom: 14px;
    }

    .modal-name {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(24px, 4vw, 32px); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.03em; line-height: 1.05;
      margin-bottom: 6px;
    }

    .modal-sub { font-size: 14px; color: var(--text2-color); margin-bottom: 18px; }

    .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }

    .mtag {
      font-size: 12px; padding: 5px 12px; border-radius: 16px;
      border: 1px solid var(--border2-color); color: var(--text2-color); font-weight: 500;
    }

    .modal-divider { height: 1px; background: var(--border-color); margin: 20px 0; }

    .modal-desc {
      font-size: 14px; line-height: 1.82; color: var(--text2-color);
      margin-bottom: 24px;
    }

    .modal-details-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
    }

    .mdetail {
      background: rgba(255,255,255,0.025); border: 1px solid var(--border-color);
      border-radius: 8px; padding: 12px 14px;
    }

    .mdetail-label {
      font-size: 10px; color: var(--text3-color); font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px;
    }

    .mdetail-value { font-size: 14px; font-weight: 500; }

    /* ─── Scrollbar global ─── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2-color); border-radius: 3px; }

    @media (max-width: 600px) {
      .hdr { padding: 0 20px; }
      .brands-wrap { padding: 40px 20px 60px; }
      .brand-hero-overlay { padding: 0 24px; }
      .products-section { padding: 28px 20px 60px; }
      .modal-body { padding: 20px 20px 28px; }
    }
  </style>
</head>
<body>
<div id="app-container">

<!-- ── HEADER ── -->
<header class="hdr">
  <img src="assets/realeaf_logo_white.png" alt="Realeaf Botanicals" class="hdr-logo" data-bind-src="storefront.logo">
  <div class="hdr-right">
    <button class="back-btn" id="backBtn" onclick="showBrands()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      <span data-bind-text="storefront.button_text">All Brands</span>
    </button>
  </div>
</header>

<!-- ══════════════════════
     BRANDS SCREEN
══════════════════════ -->
<div class="screen active" id="brandsScreen">
  <div class="brands-wrap">
    <div class="brands-hero">
      <div class="brands-hero-eyebrow" data-bind-text="storefront.eyebrow">Realeaf Botanicals</div>
      <h1 data-bind-text="storefront.title">Our Brands</h1>
      <p data-bind-text="storefront.description">Masterfully crafted cannabis products created to elevate your experience and exhilarate your life.</p>
    </div>
    <div class="brands-grid" id="brandsGrid"></div>
  </div>
</div>

<!-- ══════════════════════
     BRAND DETAIL SCREEN
══════════════════════ -->
<div class="screen" id="detailScreen">
  <div class="brand-hero">
    <div class="brand-hero-bg" id="detailHeroBg"></div>
    <div class="brand-hero-overlay">
      <div class="brand-hero-content">
        <img id="detailLogo" src="" alt="" class="brand-hero-logo">
        <div class="brand-hero-tagline" id="detailTagline"></div>
        <p class="brand-hero-desc" id="detailDesc"></p>
      </div>
    </div>
  </div>
  <div class="brand-accent-bar" id="detailAccentBar"></div>

  <div class="products-section">
    <div class="products-header">
      <div class="products-title-row">
        <span class="products-title">Products</span>
        <span class="products-count" id="productsCount"></span>
      </div>
      <div class="filter-wrap" id="filterWrap"></div>
    </div>
    <div class="products-grid" id="productsGrid"></div>
  </div>
</div>

<!-- ══════════════════════
     PRODUCT MODAL
══════════════════════ -->
<div class="modal-backdrop" id="modalBackdrop" onclick="backdropClick(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-img-wrap" id="modalImgWrap"></div>
    <div class="modal-accent" id="modalAccent"></div>
    <div class="modal-body">
      <div class="modal-brand-badge" id="modalBadge"></div>
      <h2 class="modal-name" id="modalName"></h2>
      <p class="modal-sub" id="modalSub"></p>
      <div class="modal-tags" id="modalTags"></div>
      <div class="modal-divider"></div>
      <p class="modal-desc" id="modalDesc"></p>
      <div class="modal-details-grid" id="modalDetails"></div>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════
   DATA
════════════════════════════ */
/* ════════════════════════════
   STATE
════════════════════════════ */
let activeBrand = null;
let activeFilter = 'All';

document.addEventListener('DOMContentLoaded', init);

/* ════════════════════════════
   INIT
════════════════════════════ */


/* ════════════════════════════
   BRANDS SCREEN
════════════════════════════ */

/* ════════════════════════════
   DATA FETCH
════════════════════════════ */
let appData = null;

async function loadAppData() {
  try {
    const response = await fetch('data.json');
    const data = await response.json();
    return data;
  } catch (error) {
    console.error('Failed to load app data:', error);
    return null;
  }
}

// Convert hex to rgb string for glow (simple logic)
function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1, 3), 16),
      g = parseInt(hex.slice(3, 5), 16),
      b = parseInt(hex.slice(5, 7), 16);
  return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
}

async function init() {
  appData = await loadAppData();
  if (!appData) return;

  const settings = appData.sections.app_settings;
  document.documentElement.style.setProperty('--bg-color', settings.bg_color.value);
  document.documentElement.style.setProperty('--bg2-color', settings.bg2_color.value);
  document.documentElement.style.setProperty('--bg3-color', settings.bg3_color.value);
  document.documentElement.style.setProperty('--border-color', settings.border_color.value);
  document.documentElement.style.setProperty('--border2-color', settings.border2_color.value);
  document.documentElement.style.setProperty('--text-color', settings.text_color.value);
  document.documentElement.style.setProperty('--text2-color', settings.text2_color.value);
  document.documentElement.style.setProperty('--text3-color', settings.text3_color.value);
  document.documentElement.style.setProperty('--green-color', settings.green_color.value);
  document.documentElement.style.setProperty('--green2-color', settings.green2_color.value);

  // Apply static text bindings
  document.querySelector('.hdr-logo').src = appData.sections.storefront.logo.value;
  document.querySelector('.back-btn span').textContent = appData.sections.storefront.button_text.value;
  document.querySelector('.brands-hero-eyebrow').textContent = appData.sections.storefront.eyebrow.value;
  document.querySelector('.brands-hero h1').textContent = appData.sections.storefront.title.value;
  document.querySelector('.brands-hero p').textContent = appData.sections.storefront.description.value;

  renderBrands();

  document.getElementById('app-container').classList.add('loaded');
}

/* ════════════════════════════
   BRANDS SCREEN
════════════════════════════ */
function renderBrands() {
  const brands = appData.sections.brands.value;
  const grid = document.getElementById('brandsGrid');
  grid.innerHTML = brands.map((b, idx) => `
    <div class="brand-card" data-brand="${b.id}" onclick="openBrand('${b.id}')"
         style="--brand-color:${b.accent_color}; --brand-glow:${hexToRgba(b.accent_color, 0.12)}">
      <div class="brand-card-bg" style="background-image:url('${b.hero}')" data-bind-bg-image="brands.${idx}.hero"></div>
      <div class="brand-card-overlay">
        <img src="${b.logo}" alt="${b.name}" class="brand-card-logo" data-bind-src="brands.${idx}.logo" data-bind-attr="alt:brands.${idx}.name">
        <p class="brand-card-tagline" data-bind-text="brands.${idx}.tagline">${b.tagline}</p>
        <div class="brand-card-btn">Explore <span data-bind-text="brands.${idx}.name">${b.name}</span> <span style="opacity:.7">›</span></div>
      </div>
    </div>
  `).join('');
}

/* ════════════════════════════
   OPEN BRAND
════════════════════════════ */
function openBrand(id) {
  const bIdx = appData.sections.brands.value.findIndex(x => x.id === id);
  if (bIdx === -1) return;
  const b = appData.sections.brands.value[bIdx];
  activeBrand = b;
  activeFilter = 'All';

  // We need to add data-binds dynamically to the detail view, or we can just set them since it's a single view.
  // Actually, since detailScreen is reused, the user edits might not live preview if the indices change,
  // but we can set the bindings to the currently active brand.
  const heroBg = document.getElementById('detailHeroBg');
  heroBg.style.backgroundImage = `url('${b.hero}')`;
  heroBg.setAttribute('data-bind-bg-image', `brands.${bIdx}.hero`);

  const logo = document.getElementById('detailLogo');
  logo.src = b.logo;
  logo.alt = b.name;
  logo.setAttribute('data-bind-src', `brands.${bIdx}.logo`);
  logo.setAttribute('data-bind-attr', `alt:brands.${bIdx}.name`);

  const tagline = document.getElementById('detailTagline');
  tagline.textContent = b.tagline;
  tagline.setAttribute('data-bind-text', `brands.${bIdx}.tagline`);

  const desc = document.getElementById('detailDesc');
  desc.textContent = b.description;
  desc.setAttribute('data-bind-text', `brands.${bIdx}.description`);

  const accentBar = document.getElementById('detailAccentBar');
  accentBar.style.background = b.accent_color;
  accentBar.setAttribute('data-bind-bg-color', `brands.${bIdx}.accent_color`);

  document.getElementById('backBtn').classList.add('show');

  const bProducts = appData.sections.products.value
    .map((p, idx) => ({ p, idx }))
    .filter(({ p }) => p.brand === b.id);

  buildFilters(bProducts, b);
  renderProducts(bProducts, b);

  document.getElementById('brandsScreen').classList.remove('active');
  document.getElementById('detailScreen').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function showBrands() {
  document.getElementById('detailScreen').classList.remove('active');
  document.getElementById('brandsScreen').classList.add('active');
  document.getElementById('backBtn').classList.remove('show');
  activeBrand = null;
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ════════════════════════════
   FILTERS
════════════════════════════ */
function buildFilters(bProducts, b) {
  let allTags = [];
  bProducts.forEach(({p}) => {
    if (p.tags) {
      const tagsList = p.tags.split(',').map(s=>s.trim()).filter(Boolean);
      allTags.push(...tagsList);
    }
  });
  allTags = ['All', ...new Set(allTags)];
  const wrap = document.getElementById('filterWrap');
  wrap.innerHTML = allTags.map(t => `
    <button class="filter-chip ${t === 'All' ? 'on' : ''}"
            data-tag="${t}"
            style="${t === 'All' ? chipStyle(b.accent_color) : ''}"
            onclick="applyFilter('${t}',this)">
      ${t}
    </button>
  `).join('');
}    </button>
  `).join('');
}

function chipStyle(color) {
  return `--chip-bg:${color}18;--chip-border:${color};--chip-text:${color};`;
}

function applyFilter(tag, btn) {
  activeFilter = tag;
  const color = activeBrand.accent_color;

  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.remove('on');
    c.style.cssText = '';
  });
  btn.classList.add('on');
  btn.style.cssText = chipStyle(color);

  let shown = 0;
  document.querySelectorAll('.prod-card').forEach(card => {
    const tags = card.dataset.tags.split(',');
    if (tag === 'All' || tags.includes(tag)) {
      card.classList.remove('hidden');
      shown++;
    } else {
      card.classList.add('hidden');
    }
  });

  document.getElementById('productsCount').textContent = `${shown} item${shown !== 1 ? 's' : ''}`;
}

/* ════════════════════════════
   PRODUCTS GRID
════════════════════════════ */
function renderProducts(bProducts, b) {
  const grid = document.getElementById('productsGrid');

  grid.innerHTML = bProducts.map(({p, idx}) => {
    const pTags = p.tags ? p.tags.split(',').map(s=>s.trim()).filter(Boolean) : [];
    return `
    <div class="prod-card" data-id="${p.id}" data-tags="${p.tags || ''}"
         onclick="openProduct('${p.id}')">
      <div class="prod-thumb" style="${p.thumbnail ? `background:url('${p.thumbnail}') center/cover` : `background:${p.fallback_gradient}`}"
           ${p.thumbnail ? `data-bind-bg-image="products.${idx}.thumbnail"` : ''}>
        ${p.thumbnail ? '' : `<img src="${b.logo}" alt="${b.name}" class="prod-thumb-logo">`}
      </div>
      <div class="prod-body">
        <div class="prod-name" data-bind-text="products.${idx}.name">${p.name}</div>
        <div class="prod-sub" data-bind-text="products.${idx}.sub">${p.sub}</div>
        <div class="prod-tags">
          ${pTags.slice(0,4).map(t => `<span class="ptag">${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `}).join('');

  document.getElementById('productsCount').textContent =
    `${bProducts.length} item${bProducts.length !== 1 ? 's' : ''}`;

/* ════════════════════════════
   PRODUCT MODAL
════════════════════════════ */
function openProduct(id) {
  const bIdx = appData.sections.brands.value.findIndex(x => x.id === activeBrand.id);
  const b = appData.sections.brands.value[bIdx];
  const pIdx = appData.sections.products.value.findIndex(x => x.id === id);
  if (pIdx === -1) return;
  const p = appData.sections.products.value[pIdx];

  // image
  document.getElementById('modalImgWrap').innerHTML = `
    <div style="position:absolute;inset:0;${p.thumbnail ? `background:url('${p.thumbnail}') center/cover` : `background:${p.fallback_gradient}`}"
         ${p.thumbnail ? `data-bind-bg-image="products.${pIdx}.thumbnail"` : ''}></div>
    ${p.thumbnail ? '' : `<img src="${b.logo}" alt="${b.name}" class="modal-img-logo">`}
  `;
  document.getElementById('modalImgWrap').style.position = 'relative';

  const accent = document.getElementById('modalAccent');
  accent.style.background = b.accent_color;
  accent.setAttribute('data-bind-bg-color', `brands.${bIdx}.accent_color`);

  // badge
  const badge = document.getElementById('modalBadge');
  badge.textContent = b.name;
  badge.style.cssText = `background:${b.accent_color}1a;color:${b.accent_color};border:1px solid ${b.accent_color}35;`;
  badge.setAttribute('data-bind-text', `brands.${bIdx}.name`);
  badge.setAttribute('data-bind-color', `brands.${bIdx}.accent_color`);
  badge.setAttribute('data-bind-border-color', `brands.${bIdx}.accent_color`);
  // Note: background color with alpha might be tricky for direct bindings since it needs alpha, but we'll bind text and text color

  const mName = document.getElementById('modalName');
  mName.textContent = p.name;
  mName.setAttribute('data-bind-text', `products.${pIdx}.name`);

  const mSub = document.getElementById('modalSub');
  mSub.textContent = p.sub;
  mSub.setAttribute('data-bind-text', `products.${pIdx}.sub`);

  const mDesc = document.getElementById('modalDesc');
  mDesc.textContent = p.description;
  mDesc.setAttribute('data-bind-text', `products.${pIdx}.description`);

  const pTags = p.tags ? p.tags.split(',').map(s=>s.trim()).filter(Boolean) : [];
  document.getElementById('modalTags').innerHTML =
    pTags.map(t => `<span class="mtag">${t}</span>`).join('');

  const details = [];
  if (p.detail_1_label) details.push({k: p.detail_1_label, v: p.detail_1_value, i: 1});
  if (p.detail_2_label) details.push({k: p.detail_2_label, v: p.detail_2_value, i: 2});
  if (p.detail_3_label) details.push({k: p.detail_3_label, v: p.detail_3_value, i: 3});
  if (p.detail_4_label) details.push({k: p.detail_4_label, v: p.detail_4_value, i: 4});

  document.getElementById('modalDetails').innerHTML =
    details.map(d => `
      <div class="mdetail">
        <div class="mdetail-label" data-bind-text="products.${pIdx}.detail_${d.i}_label">${d.k}</div>
        <div class="mdetail-value" data-bind-text="products.${pIdx}.detail_${d.i}_value">${d.v}</div>
      </div>
    `).join('');

  document.getElementById('modal').scrollTop = 0;
  document.getElementById('modalBackdrop').classList.add('open');
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
}

function backdropClick(e) {
  if (e.target === document.getElementById('modalBackdrop')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>

          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</div>
